<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wild Blue Yonder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            grotesk: ['"Open Sans"', 'sans-serif'],
          },
          colors: {
            'yonder': '#0028FF',
          }
        }
      }
    }
  </script>
  <style>
    ::selection {
      background: white;
      color: #0028FF;
    }
    .toggle-track {
      width: 68px;
      height: 32px;
      border-radius: 16px;
      border: 2px solid white;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      background: transparent;
      flex-shrink: 0;
    }
    .toggle-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: white;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toggle-track.active .toggle-thumb {
      transform: translateX(36px);
    }
    .lang-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }
    .lang-label.dim {
      opacity: 0.4;
    }
  </style>
</head>
<body class="bg-yonder font-grotesk text-white">

  <!-- Language Toggle -->
  <div class="fixed top-6 right-6 md:top-8 md:right-10 z-50 flex items-center gap-3">
    <span id="label-en" class="lang-label" onclick="setLang('en')">EN</span>
    <div id="toggle" class="toggle-track" onclick="toggleLang()">
      <div class="toggle-thumb"></div>
    </div>
    <span id="label-de" class="lang-label dim" onclick="setLang('de')">DE</span>
  </div>

  <main class="min-h-screen px-6 py-20 md:px-16 lg:px-32 xl:px-48 max-w-[1400px] mx-auto">

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight lang-text"
       data-en="Hey, we're Wild Blue Yonder. And this is our website. Obviously! Or better said: our poor excuse for a website."
       data-de="Hey, wir sind Wild Blue Yonder. Und das ist unsere Website. Offensichtlich! Oder besser gesagt: unsere schlechte Entschuldigung für eine Website.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="We're working with full force on our actual website. All other website owners might want to get used to the idea that hard times are coming. Because our website will be a website that's truly insanely great and practically does everything you could dream a website could do. A website as beautiful as a sunset reflected in George Clooney's eyes. Or Timothée Chalamet's, if you prefer. A website that inspires, gives life a certain lightness, whispers La Dolce Vita into one ear and Carpe Diem into the other every morning, a website that prevents Donald Trump from becoming president again."
       data-de="An unserer eigentlichen Website arbeiten wir mit Hochdruck. Da können sich alle anderen Website-Inhaber mit dem Gedanken anfreunden, dass schwierige Zeiten auf sie zukommen werden. Unsere Website wird nämlich eine Website sein, die wirklich irre toll ist und praktisch alles kann, was man sich von einer Website erträumt. Nämlich eine Website, die so schön ist wie ein Sonnenuntergang, der sich in den Augen von George Clooney spiegelt. Oder Timothée Chalamet, wenn man den mehr mag. Eine Website, die inspiriert, dem Leben eine gewisse Leichtigkeit verleiht und einem jeden Morgen La Dolce Vita ins eine und Carpe Diem ins andere Ohr flüstert, eine Website, die verhindert, dass Donald Trump noch einmal Präsident wird.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Okay, probably not even the American Constitution can prevent that."
       data-de="Okay, das kann wahrscheinlich noch nicht mal die amerikanische Verfassung verhindern.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="What's keeping us from launching this revolutionary website? Well, we haven't had time to build it yet. And let's be honest: who has time to develop a website that's as beautiful as a sunset reflected in George Clooney's or Timothée Chalamet's eyes? Not us. Maybe David. David might have time for something like that. David, are you reading this? That would be a real coincidence!"
       data-de="Was uns davon abhält, unsere revolutionäre Website online zu stellen? Nun, wir haben bisher leider keine Zeit gehabt, sie zu entwickeln. Und mal Hand aufs Herz: Wer hat schon Zeit dafür, eine Website zu entwickeln, die so schön ist wie ein Sonnenuntergang, der sich in den Augen von George Clooney oder Timothée Chalamet spiegelt? Wir jedenfalls nicht. David vielleicht. David hat vielleicht für so etwas Zeit. David, liest du das gerade? Nun, das wäre jetzt ein echter Zufall!">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="We know a David from our high school days who built insanely complex websites and got very rich doing it. Not Mark Zuckerberg rich, but I-own-a-villa-in-Mallorca rich. That's already something! Anyway, maybe David has time for such a thing. Well… probably not. Once you're rich, you probably don't develop websites anymore. Or has anyone ever heard of a rich person saying: &quot;Hey, why don't we just let the golf clubs rot in the Louis Vuitton bag and build a website after breakfast?&quot; No. We have to be realistic!"
       data-de="Wir kennen nämlich einen David aus unserer Zeit auf dem Gymnasium, der eine Menge höllisch komplexer Websites gebaut hat und tja, sehr reich damit wurde. Nicht Mark-Zuckerberg-reich, aber ich-habe-eine-Finca-auf-Mallorca-reich. Das ist doch schon was! Jedenfalls könnte David für so etwas Zeit haben. Naja. Wahrscheinlich hat er das nicht. Ist man erstmal reich, dann entwickelt man sicher keine Websites mehr. Oder hat jemand schon mal von einem Reichen gehört, der gesagt hätte: „Hey, können wir nicht einfach mal die Golfschläger in der Louis-Vitton-Tasche vergammeln lassen und nach dem Frühstück eine Website entwickeln?" Nein. Wir müssen hier realistisch sein!">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Rich people hire non-rich people to develop websites. If at all. Let's be clear: most rich people no longer have time for the things that made them rich. Often, they don't have time for anything at all. (David, if you're reading this: we're still waiting for your call. An investment in us is really worth it. Seriously!)"
       data-de="Reiche Leute beschäftigen nicht-so-reiche Leute für die Entwicklung von Websites. Wenn überhaupt. Halten wir fest: Die meisten Reichen haben selbst keine Zeit mehr für die Dinge, mit denen sie reich geworden sind. Oft haben sie überhaupt gar keine Zeit für irgendwas (David, falls du das hier liest: Wir warten immer noch auf deinen Anruf. Ein Investment in uns lohnt sich. Wirklich!).">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Okay, that's about David and being rich. Now, to avoid misunderstandings: it's not that rich people don't care about anything at all. They only care about things that really interest them. In that way, they resemble us ordinary citizens. Only we ordinary citizens often don't have a choice: for professional reasons we often must care about things that don't interest us—things you find in folders, or file away yourself. Things that, just at the thought of them, smell like the grave of Jesus."
       data-de="Okay, das zum Thema David und zum Thema Reichsein! Nun, um Missverständnisse zu vermeiden: Es ist nicht so, dass Reiche sich für rein gar nichts interessieren würden. Sie interessieren sich eben nur für Dinge, die wirklich von Interesse für SIE sind. Darin ähneln sie dann auch wiederum uns einfachen Bürgern. Nur, dass wir einfache Bürger oft keine Wahl haben: Schon aus beruflichen Gründen müssen wir uns oft für Dinge interessieren, die nicht von Interesse für uns sind – Dinge, die man in Aktenordnern findet oder selbst dort abheftet. Dinge, die schon beim Gedanken an sie müffeln wie das Grab von Jesus.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Speaking of Jesus: after the resurrection, did the stone in front of his tomb actually roll back, or did someone simply decide to air it out? Of course, the quality of this comparison depends a little on that."
       data-de="Apropos Jesus: Ist der Stein vor seinem Grab nach der Auferstehung eigentlich wieder zurückgerollt worden? Oder hat man sich doch lieber dafür entschieden, durchzulüften? Davon hängt natürlich ein bisschen die Qualität des Vergleichs ab.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Anyway, our lives are full of things we don't care about, which sometimes gives a sense of alienation. So we have to carefully decide how to spend the remaining time. For example, on family: a spouse, a partner, a child. Their hopes, their wishes, their pain. Or all the other nonsense attached to family: like whether Aunt Hiltrud has been visited as often as Uncle Heinz. And everyone knows how meticulously Uncle Heinz keeps track of visits."
       data-de="Da unser Leben jedenfalls mit Dingen gefüllt ist, für die wir uns nicht interessieren, was uns dann und wann ein gewisses Gefühl der Entfremdung beschert, müssen wir uns sehr genau überlegen, was wir mit der restlichen Zeit anstellen. Man könnte sich zum Beispiel in der restlichen Zeit für seine Familie interessieren. Für die Ehefrau, den Ehemann, die Freundin, den Freund, das Kind oder die Kinder. Für ihre Hoffnungen, ihre Wünsche und ihren Schmerz. Oder den ganzen Quatsch, der an der Familie hinten dran hängt. Zum Beispiel für die Frage: Ob man Tante Hiltrud jetzt genau so oft besucht hat wie den Onkel Heinz. Und jeder weiß, wie penibel Onkel Heinz die Anzahl der Besuche nachhält.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Then there are the many other questions gnawing at the fine underwear of the soul: do we need a new vacuum cleaner, a robot vacuum, or is changing the bag enough? Or does the fridge need defrosting? When you ask yourself this question, it is usually high time to act."
       data-de="Daneben nagen die vielen anderen Fragen an der feinen Unterwäsche der Seele: Braucht man einen neuen Staubsauger, einen Staubsauger-Roboter oder reicht es, den Beutel zu wechseln? Oder muss der Kühlschrank mal wieder abgetaut werden? Wenn man sich diese Frage stellt, ist es meistens allerhöchste Zeit.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Anyway. We think we can agree: in life it's one of the more important activities to care for your own family and all the stuff that comes with it. After all, our relationships are the most important thing in the world. Let's assume that's true: for everything else, not much is left—just a few crumbs of time—that's all. What you do with that time should absolutely be worth it, don't you think? So what do you do with the quarter-hour left each day?"
       data-de="Egal. Wir denken, wir sind uns darin einig, dass es im Leben zu den eher wichtigen Beschäftigungen gehört, sich für die eigene Familie zu interessieren und all dem, was da leider noch dranhängt. Schließlich sind unsere Beziehungen doch das Wichtigste auf der Welt. Nehmen wir mal an, dass das wahr ist: Für alles andere bleibt dann nicht mehr viel übrig – ein paar Zeitkrümmel – das ist alles. Die Dinge, die man damit macht, sollten es absolut wert sein, meinst du nicht auch? Also: Was macht man mit der Viertelstunde, die noch bleibt am Tag?">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Take your time answering! You won't write the new Ulysses in that short time, that's for sure. But then what? Build a model train in the basement? Sculpt your abs into a six-pack? Learn French? All noble and good goals! The truth is: there's no right or wrong here. The main thing is that you can say at the next dinner party: &quot;I spent my tiny bit of free time doing this and that.&quot;"
       data-de="Nimm dir ruhig etwas Raum für die Beantwortung der Frage! Man wird in der knappen Zeit nicht den neuen Ulysses schreiben, so viel ist mal sicher. Aber was dann? Eine elektrische Eisenbahn im Keller aufbauen? Die Bauchmuskulatur zu einem Six-Pack trainieren? Französisch lernen? Das sind alles hehre und gute Ziele! Die Wahrheit ist: Es gibt hier kein richtig oder falsch. Die Hauptsache ist, man kann auf der nächsten Dinner-Party sagen: „Ich mache mit meiner knappen Zeit das und das."">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="For example, we decided to say at the next dinner party: &quot;We focus exclusively on art in the tiny bit of time daily life leaves us.&quot; And if then we are asked why we focus exclusively on art, when there are things like the model train, six-pack, or French, we answer: &quot;We focus exclusively on art in order to get very good at it.&quot; After all, you also need to train your interest in art, refine it, elevate it to new heights if you want to extract maximum satisfaction. Forgive me: for yourself AND for others. Because part of that satisfaction is also that you can share your interest with others."
       data-de="Wir haben uns zum Beispiel dazu entschieden, auf der nächsten Dinner Party zu sagen: „Wir interessieren uns ausschließlich für Kunst in der knappen Zeit, die uns der Alltag lässt." Und wenn wir dann gefragt werden, warum wir uns ausschließlich für Kunst interessieren, wo es doch Dinge wie die elektrische Eisenbahn, die Bauchmuskulatur oder Französisch gibt, dann antworten wir: „Wir interessieren uns ausschließlich für Kunst, um darin sehr gut zu werden." Schließlich muss auch das Interesse für Kunst trainiert, veredelt, ja, zu neuen Höhen gesteigert werden, will man die maximale Befriedigung für sich herausholen. Verzeihung, für sich UND für andere. Denn auch das ist Teil der Befriedigung: Dass man sein Interesse mit anderen teilen kann.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="There's a simple formula: personal interest × fellow enthusiasts = size of satisfaction. But the formula quickly reaches its natural limits: beyond a certain number of fellow enthusiasts, satisfaction no longer grows in proportion to what you expected. Then the many fellow enthusiasts are just an anonymous, meaningless mass. This applies equally to shared interest in sex and shared interest in art. For us, the limit is about one million. Anything beyond that won't give us any extra satisfaction, we've found. But that's certainly something individual."
       data-de="Es gilt die Faustformel: Eigeninteresse mal Mitinteressierte gleich Größe der Befriedigung. Wobei die Formel schnell an ihre natürlichen Grenzen stößt: Ab einer gewissen Anzahl der Mitinteressierten wächst die Befriedigung nicht mehr in dem Maße, wie man sich das vorher so gedacht hatte. Dann sind die vielen Mitinteressierten einfach nur noch eine bloße, anonyme, nichtssagende Masse. Das gilt für das geteilte Interesse an Geschlechtsverkehr genauso wie das geteilte Interesse an Kunst. Bei uns liegt die Grenze bei ungefähr einer Million. Alles, was darüber geht, wird uns keine zusätzliche Befriedigung mehr verschaffen, haben wir für uns herausgefunden. Aber das ist sicher etwas Individuelles.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Anyway, back to the topic of time. We carve out time for our interest in art from the little time left in everyday life. And this carved-out time, as we've already established, is fingernail-sized compared to the rest of the body. That's not much unless you're the alien from the movie Alien. Just for the record: we are not the alien from the movie Alien (and who we are isn't really important!)."
       data-de="Aber eigentlich waren wir ja beim Thema Zeit. Wir knapsen uns die Zeit für unser Interesse an der Kunst von der wenigen Zeit ab, die im Alltag übrig bleibt. Und diese Zeit, die wir uns abknapsen, ist, wie wir bereits festgestellt haben, fingernagelgroß im Vergleich zum Restkörper. Das ist nicht besonders viel, wenn man nicht gerade das Alien aus dem Film Alien ist. Nur fürs Protokoll: Wir sind nicht das Alien aus dem Film Alien (und wer wir sind, ist gar nicht so wichtig!).">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="The point is: that's why we still don't have a website as beautiful as a sunset reflected in George Clooney's eyes, which prevents Donald Trump from becoming president again. And in the future, we will not work on such a website. On the contrary! The current website is exactly the website you will continue to find here: a website with long white text on a blue background. Nothing more. Nothing less."
       data-de="Der Punkt ist: Deshalb haben wir nach wie vor keine Website, die so schön ist wie ein Sonnenuntergang, der sich in den Augen von George Clooney spiegelt und verhindert, dass Donald Trump noch einmal Präsident wird. Und auch in Zukunft werden wir nicht an einer solchen Website arbeiten. Im Gegenteil! Die aktuelle Website ist genau die Website, die du auch in Zukunft hier finden wirst: eine Website mit einem langen weißen Text auf einem blauen Hintergrund. Nicht mehr. Und nicht weniger.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 lang-text"
       data-en="Admittedly, the usefulness of the website—let's put it mildly—is practically nonexistent. Of course, we can imagine a tiny bit of usefulness. For you too. For example, you could wear a sweater in the same blue, take a selfie, post it on the social media platform of your choice, and claim that you only look at websites in the same blue as your sweater. Admittedly: that would be pretty weird. Only crazies do that. And artists. By the way: if your sweater is red, we recommend visiting a red website."
       data-de="Zugegeben: Damit ist der Nutzen der Website – drücken wir es mal vorsichtig aus – so gut wie nicht vorhanden. Einen geringen Nutzen können wir uns natürlich schon vorstellen. Auch für dich. Du könntest zum Beispiel einen Pullover in dem gleichen Blau anziehen, ein Selfie machen, es auf dem Social-Media-Kanal deiner Wahl posten und behaupten, dass du dir ausschließlich Websites in dem gleichen Blau deines Pullovers anschaust. Zugegeben: Das wäre ziemlich weird. So etwas machen eigentlich nur Spinner. Und Künstler. Nebenbei gesagt: Wenn dein Pullover rot ist, empfehlen wir dir, eine rote Website zu besuchen.">
    </p>

    <p class="text-2xl md:text-3xl lg:text-4xl xl:text-5xl leading-snug md:leading-snug lg:leading-snug xl:leading-snug font-medium tracking-tight mt-12 md:mt-16 mb-4 lang-text"
       data-en="And this is our poor excuse for an Instagram account:"
       data-de="Und das ist unsere schlechte Entschuldigung für einen Instagram-Account:">
    </p>

    <a href="https://www.instagram.com/wildblueyonder.xyz" target="_blank" rel="noopener noreferrer"
       class="inline-block text-2xl md:text-3xl lg:text-4xl xl:text-5xl font-medium tracking-tight underline underline-offset-8 decoration-2 hover:opacity-70 transition-opacity duration-300">
      www.instagram.com/wildblueyonder.xyz
    </a>

    <div class="h-32 md:h-48"></div>

  </main>

  <script>
    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      const toggle = document.getElementById('toggle');
      const labelEn = document.getElementById('label-en');
      const labelDe = document.getElementById('label-de');

      if (lang === 'de') {
        toggle.classList.add('active');
        labelEn.classList.add('dim');
        labelDe.classList.remove('dim');
        document.documentElement.lang = 'de';
      } else {
        toggle.classList.remove('active');
        labelEn.classList.remove('dim');
        labelDe.classList.add('dim');
        document.documentElement.lang = 'en';
      }

      document.querySelectorAll('.lang-text').forEach(el => {
        el.textContent = el.dataset[lang];
      });
    }

    function toggleLang() {
      setLang(currentLang === 'en' ? 'de' : 'en');
    }

    // Initialize with English
    setLang('en');
  </script>

</body>
</html>
